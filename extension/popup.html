<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YT-DLP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --panel2:#eef3f8;
  --border:#d7dee8;
  --border2:#b8c4d2;
  --accent:#087f5b;
  --accent-dim:#e3f7ef;
  --accent-glow:#087f5b26;
  --red:#c92a2a;
  --yellow:#b7791f;
  --blue:#0b65c2;
  --text:#17212f;
  --muted:#4f5f72;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,"Segoe UI",sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{
  width:400px;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:13px;
  max-height:600px;
  overflow-x:hidden;
  overflow-y:auto;
}
body.large-text{
  font-size:14px;
}
body.large-text #url-input,
body.large-text #load-btn,
body.large-text .meta-input,
body.large-text .q-chip,
body.large-text #log-box,
body.large-text #srv-warn p{
  font-size:12px;
}
body.large-text .slabel,
body.large-text .fmt-name,
body.large-text .vtitle{
  font-size:13px;
}
body.large-text #dl-btn{
  font-size:15px;
}

/* ── HEADER ── */
.hdr{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px 17px 13px;
  border-bottom:1px solid var(--border);
  background:var(--panel);
  position:relative;
  box-shadow:0 1px 0 rgba(23,33,47,.04);
}
.hdr::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent)40%,transparent);
}
.logo{
  width:32px;height:32px;
  background:linear-gradient(135deg,#12b886,#228be6);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 6px 14px var(--accent-glow);
}
.logo svg{width:16px;height:16px;fill:#fff}
.hdr-info h1{
  font-family:'Syne',sans-serif;
  font-size:15px;font-weight:800;
  color:var(--text);
}
.hdr-info .sub{
  font-family:var(--mono);
  font-size:10px;color:var(--muted);margin-top:1px;
}
.server-pill{
  margin-left:auto;
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;
  border-radius:99px;
  border:1px solid var(--border2);
  background:var(--panel);
  font-family:var(--mono);
  font-size:10px;color:var(--muted);
  cursor:pointer;
  transition:all .2s;
}
.server-pill:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.settings-btn{
  width:28px;height:28px;
  border:1px solid var(--border2);
  border-radius:8px;
  background:var(--panel);
  color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .2s;
}
.settings-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.settings-btn svg{width:15px;height:15px}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--red);
  box-shadow:0 0 6px var(--red);
  transition:background .3s,box-shadow .3s;
}
.dot.on{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* ── CONTENT ── */
.content{padding:15px 17px 17px}

/* URL bar */
.url-row{display:flex;gap:6px;margin-bottom:12px}
#url-input{
  flex:1;
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:7px;
  padding:9px 10px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--text);
  outline:none;
  transition:border .2s,box-shadow .2s;
  min-width:0;
}
#url-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#url-input::placeholder{color:var(--muted)}
#load-btn{
  background:#fff;
  border:1px solid var(--border2);
  border-radius:7px;
  padding:9px 12px;
  color:var(--text);
  font-family:var(--sans);
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
#load-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Video info */
#video-info{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:12px;
  display:none;
}
#video-info.show{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.thumb-row{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.thumb-row img{width:100%;height:100%;object-fit:cover;display:block}
.thumb-row::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(8,12,16,.85) 0%,transparent 55%);
}
.dur{
  position:absolute;bottom:7px;right:8px;z-index:1;
  background:rgba(0,0,0,.8);
  font-family:var(--mono);font-size:10px;
  padding:2px 6px;border-radius:4px;color:#fff;
}
.vmeta{padding:10px 12px 12px}
.vtitle{
  font-size:12px;font-weight:700;line-height:1.5;
  color:var(--text);margin-bottom:6px;
  display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.vmeta-row{display:flex;gap:12px;align-items:center}
.vtag{
  font-size:10px;color:var(--muted);
  display:flex;align-items:center;gap:3px;
}

/* Section label */
.slabel{
  font-size:12px;color:var(--text);
  text-transform:uppercase;margin-bottom:6px;
  font-weight:700;
}

/* Format grid */
.fmt-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:12px}
.fmt-btn{
  background:var(--panel);border:1px solid var(--border);
  border-radius:7px;padding:8px 4px;
  text-align:center;cursor:pointer;transition:all .15s;
}
.fmt-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.fmt-btn.active{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 3px var(--accent-glow)}
.fmt-name{font-size:12px;font-weight:800;color:var(--text)}
.fmt-btn.active .fmt-name{color:var(--accent)}
.fmt-type{font-size:10px;color:var(--muted);margin-top:2px}

/* Quality */
.q-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.q-chip{
  background:var(--panel);border:1px solid var(--border);
  border-radius:5px;padding:5px 8px;
  font-size:11px;color:var(--text);cursor:pointer;
  transition:all .15s;
}
.q-chip:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.q-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}

/* Metadata */
.meta-panel{
  margin-bottom:12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--panel);
  overflow:hidden;
}
.meta-panel summary{
  padding:10px 11px;
  cursor:pointer;
  font-weight:800;
  list-style:none;
}
.meta-panel summary::-webkit-details-marker{display:none}
.meta-panel summary::after{
  content:'+';
  float:right;
  color:var(--muted);
}
.meta-panel[open] summary{
  border-bottom:1px solid var(--border);
}
.meta-panel[open] summary::after{content:'-'}
.meta-fields{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  padding:10px 11px 12px;
}
.meta-field.full{grid-column:1 / -1}
.meta-label{
  display:block;
  margin-bottom:4px;
  font-size:11px;
  font-weight:700;
  color:var(--text);
}
.meta-input{
  width:100%;
  border:1px solid var(--border2);
  border-radius:6px;
  background:#fff;
  color:var(--text);
  font-family:var(--sans);
  font-size:11px;
  padding:7px 8px;
  outline:none;
}
textarea.meta-input{
  min-height:54px;
  resize:vertical;
}
.meta-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}

/* Download btn */
#dl-btn{
  width:100%;
  background:linear-gradient(135deg,#087f5b,#0b65c2);
  border:none;border-radius:9px;
  padding:13px;
  font-family:var(--sans);
  font-size:14px;font-weight:800;
  color:#fff;
  cursor:pointer;
  transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 20px var(--accent-glow);
}
#dl-btn:hover{opacity:.9;box-shadow:0 6px 28px var(--accent-glow);transform:translateY(-1px)}
#dl-btn:active{transform:translateY(0)}
#dl-btn:disabled{
  background:var(--panel2);border:1px solid var(--border);
  color:var(--muted);cursor:not-allowed;
  box-shadow:none;transform:none;opacity:1;
}
#dl-btn svg{width:15px;height:15px}

/* Terminal log */
#log-box{
  margin-top:10px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  font-size:11px;
  line-height:1.7;
  color:var(--text);
  max-height:90px;
  overflow-y:auto;
  display:none;
  word-break:break-all;
}
#log-box.show{display:block}
.log-ok{color:var(--accent)}
.log-err{color:var(--red)}
.log-info{color:var(--blue)}

/* Server warning */
#srv-warn{
  margin-top:10px;
  padding:10px 12px;
  background:#fff8e6;
  border:1px solid var(--border);
  border-left:3px solid var(--yellow);
  border-radius:8px;
  display:none;
}
#srv-warn.show{display:block}
#srv-warn p{font-size:11px;color:var(--text);line-height:1.65}
#srv-warn strong{color:var(--yellow)}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{
  display:inline-block;width:11px;height:11px;
  border:2px solid rgba(255,255,255,.45);
  border-top-color:#fff;
  border-radius:50%;animation:spin .5s linear infinite;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
  </div>
  <div class="hdr-info">
    <h1>YT-DL</h1>
    <div class="sub">LOCAL DOWNLOADER</div>
  </div>
  <div class="server-pill" id="srv-pill" title="サーバーに再接続">
    <div class="dot" id="srv-dot"></div>
    <span id="srv-label">確認中</span>
  </div>
  <button class="settings-btn" id="settings-btn" title="設定を開く" aria-label="設定を開く">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.37-.31-.6-.22l-2.49 1a7.28 7.28 0 0 0-1.69-.98L14.5 2.42A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42L9.13 5.07c-.6.23-1.16.56-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.08.65-.08.98s.03.66.08.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.12.22.37.31.6.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.49.42h4c.24 0 .45-.18.49-.42l.38-2.65c.6-.23 1.16-.56 1.69-.98l2.49 1c.23.08.48 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
  </button>
</div>

<div class="content">

  <!-- URL -->
  <div class="url-row">
    <input id="url-input" type="text" placeholder="https://www.youtube.com/watch?v=...">
    <button id="load-btn">情報取得</button>
  </div>

  <!-- Video card -->
  <div id="video-info">
    <div class="thumb-row">
      <img id="thumb" src="" alt="" width="366" height="206">
      <span class="dur" id="dur"></span>
    </div>
    <div class="vmeta">
      <div class="vtitle" id="vtitle"></div>
      <div class="vmeta-row">
        <span class="vtag" id="vch">📺 —</span>
        <span class="vtag" id="vviews"></span>
      </div>
    </div>
  </div>

  <!-- Format -->
  <div class="slabel">フォーマット</div>
  <div class="fmt-grid">
    <div class="fmt-btn active" data-f="mp4"><div class="fmt-name">MP4</div><div class="fmt-type">動画</div></div>
    <div class="fmt-btn" data-f="mov"><div class="fmt-name">MOV</div><div class="fmt-type">動画</div></div>
    <div class="fmt-btn" data-f="webm"><div class="fmt-name">WebM</div><div class="fmt-type">動画</div></div>
    <div class="fmt-btn" data-f="mp3"><div class="fmt-name">MP3</div><div class="fmt-type">音声</div></div>
    <div class="fmt-btn" data-f="m4a"><div class="fmt-name">M4A</div><div class="fmt-type">音声</div></div>
  </div>

  <!-- Quality -->
  <div id="q-section">
    <div class="slabel">画質</div>
    <div class="q-row">
      <div class="q-chip" data-q="360">360p</div>
      <div class="q-chip" data-q="480">480p</div>
      <div class="q-chip active" data-q="720">720p HD</div>
      <div class="q-chip" data-q="1080">1080p FHD</div>
      <div class="q-chip" data-q="1440">1440p 2K</div>
      <div class="q-chip" data-q="2160">4K</div>
      <div class="q-chip" data-q="max">最高画質</div>
    </div>
  </div>

  <!-- Metadata -->
  <details class="meta-panel" id="meta-panel">
    <summary>メタデータ編集</summary>
    <div class="meta-fields">
      <label class="meta-field full">
        <span class="meta-label">タイトル</span>
        <input class="meta-input" id="meta-title" type="text" autocomplete="off">
      </label>
      <label class="meta-field">
        <span class="meta-label">アーティスト</span>
        <input class="meta-input" id="meta-artist" type="text" autocomplete="off">
      </label>
      <label class="meta-field">
        <span class="meta-label">アルバム</span>
        <input class="meta-input" id="meta-album" type="text" autocomplete="off">
      </label>
      <label class="meta-field">
        <span class="meta-label">ジャンル</span>
        <input class="meta-input" id="meta-genre" type="text" autocomplete="off">
      </label>
      <label class="meta-field">
        <span class="meta-label">日付</span>
        <input class="meta-input" id="meta-date" type="text" inputmode="numeric" placeholder="2026">
      </label>
      <label class="meta-field full">
        <span class="meta-label">コメント</span>
        <textarea class="meta-input" id="meta-comment"></textarea>
      </label>
    </div>
  </details>

  <!-- Download -->
  <button id="dl-btn" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    ダウンロード開始
  </button>

  <!-- Log -->
  <div id="log-box"></div>

  <!-- Server warning -->
  <div id="srv-warn">
    <p><strong>⚡ サーバーが起動していません</strong><br>
    以下のコマンドでサーバーを起動してください:<br>
    <code>python3 server/server.py</code><br>
    接続先: <code id="api-url-label">http://localhost:9876</code></p>
  </div>

</div>

<script src="popup.js" defer></script>
</body>
</html>
