<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>YT-DL 設定</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --panel2:#eef3f8;
  --border:#d7dee8;
  --border2:#b8c4d2;
  --accent:#087f5b;
  --accent-dim:#e3f7ef;
  --red:#c92a2a;
  --text:#17212f;
  --muted:#4f5f72;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,"Segoe UI",sans-serif;
  --mono:"SFMono-Regular","JetBrains Mono",Consolas,monospace;
}
body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
}
.wrap{
  max-width:760px;
  margin:0 auto;
  padding:32px 20px 48px;
}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:22px;
}
h1{
  margin:0 0 4px;
  font-size:26px;
  line-height:1.2;
}
.lead{
  margin:0;
  color:var(--muted);
  line-height:1.6;
}
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:8px;
  padding:22px;
  box-shadow:0 10px 28px rgba(23,33,47,.06);
}
.section{
  padding:18px 0;
  border-bottom:1px solid var(--border);
}
.section:first-child{padding-top:0}
.section:last-of-type{border-bottom:none}
.section h2{
  margin:0 0 14px;
  font-size:16px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}
label{
  font-weight:700;
}
.hint{
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
.check-row .hint{display:block}
input,
select{
  width:100%;
  border:1px solid var(--border2);
  border-radius:7px;
  background:#fff;
  color:var(--text);
  font:inherit;
  padding:10px 11px;
  outline:none;
}
input[type="url"],
input[type="text"]{
  font-family:var(--mono);
  font-size:14px;
}
input:focus,
select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(8,127,91,.16);
}
.check-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
}
.check-row input{
  width:18px;
  height:18px;
  margin-top:2px;
  accent-color:var(--accent);
}
.actions{
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:flex-end;
  padding-top:18px;
}
button{
  border:1px solid var(--border2);
  border-radius:7px;
  padding:10px 14px;
  font:inherit;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  color:var(--text);
}
button:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.primary:hover{
  background:#06694b;
  color:#fff;
}
#status{
  margin-right:auto;
  color:var(--muted);
  font-size:14px;
}
#status.err{color:var(--red)}
#status.ok{color:var(--accent)}
@media (max-width:640px){
  .wrap{padding:24px 14px 40px}
  .top{display:block}
  .grid{grid-template-columns:1fr}
  .actions{align-items:stretch;flex-direction:column}
  #status{margin-right:0}
}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div>
      <h1>YT-DL 設定</h1>
      <p class="lead">ポップアップで使う既定値と接続先を設定します。</p>
    </div>
  </div>

  <form class="card" id="settings-form">
    <section class="section">
      <h2>接続</h2>
      <div class="field">
        <label for="api-base">ローカルサーバーURL</label>
        <input id="api-base" type="url" inputmode="url" value="http://localhost:9876" placeholder="http://localhost:9876">
        <div class="hint">別PCから使う場合は、サーバー起動時に表示される http://192.168.x.x:9876 のようなURLを入力します。</div>
      </div>
    </section>

    <section class="section">
      <h2>ダウンロード</h2>
      <div class="grid">
        <div class="field">
          <label for="format">既定フォーマット</label>
          <select id="format">
            <option value="mp4">MP4 動画</option>
            <option value="mov">MOV 動画</option>
            <option value="webm">WebM 動画</option>
            <option value="mp3">MP3 音声</option>
            <option value="m4a">M4A 音声</option>
          </select>
        </div>
        <div class="field">
          <label for="quality">既定画質</label>
          <select id="quality">
            <option value="360">360p</option>
            <option value="480">480p</option>
            <option value="720" selected>720p HD</option>
            <option value="1080">1080p FHD</option>
            <option value="1440">1440p 2K</option>
            <option value="2160">4K</option>
            <option value="max">最高画質</option>
          </select>
          <div class="hint">音声フォーマット選択時はポップアップで画質欄を隠します。</div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>表示</h2>
      <div class="grid">
        <div class="field">
          <label for="text-size">文字サイズ</label>
          <select id="text-size">
            <option value="normal">標準</option>
            <option value="large">大きめ</option>
          </select>
        </div>
        <label class="check-row">
          <input id="auto-load-info" type="checkbox" checked>
          <span>
            <strong>YouTubeページでは自動で動画情報を取得する</strong>
            <span class="hint">オフにすると、ポップアップで「情報取得」を押すまで通信しません。</span>
          </span>
        </label>
        <label class="check-row">
          <input id="show-log" type="checkbox" checked>
          <span>
            <strong>ポップアップにログを表示する</strong>
            <span class="hint">オフにすると、接続確認やダウンロード進捗メッセージを非表示にします。</span>
          </span>
        </label>
      </div>
    </section>

    <div class="actions">
      <span id="status" role="status"></span>
      <button type="button" id="reset-btn">初期値に戻す</button>
      <button class="primary" type="submit">保存</button>
    </div>
  </form>
</main>
<script src="options.js" defer></script>
</body>
</html>
